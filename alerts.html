<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>实时告警列表 - 舆情告警工作台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="main-container" id="mainContent">
    <div class="page-header">
      <div class="page-title-block">
        <h1>🚨 实时告警</h1>
        <p>敏感词命中内容按时间滚动展示，点击卡片查看详情并标记处置状态</p>
      </div>
      <div class="btn-group">
        <button class="btn" id="pauseBtn" onclick="togglePause()">⏸ 暂停刷新</button>
        <button class="btn btn-primary" onclick="markAllRead()">📌 全部标为已读</button>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="two-column">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">
            告警列表
            <span id="liveBadge" style="display:inline-flex;align-items:center;gap:6px;margin-left:8px;">
              <span class="alert-pulse"></span>
              <span style="font-size:12px;color:var(--accent-red);font-weight:500;">LIVE</span>
            </span>
          </div>
          <div class="filter-bar" style="margin-bottom:0;">
            <div class="search-box">
              <input type="text" id="searchInput" placeholder="搜索关键词、作者、来源...">
            </div>
            <select class="form-select filter-select" id="platformFilter" onchange="renderAlertList()">
              <option value="">全部平台</option>
            </select>
            <select class="form-select filter-select" id="categoryFilter" onchange="renderAlertList()">
              <option value="">全部类别</option>
            </select>
            <select class="form-select filter-select" id="levelFilter" onchange="renderAlertList()">
              <option value="">全部等级</option>
              <option value="red">🔴 一级</option>
              <option value="orange">🟠 二级</option>
              <option value="yellow">🟡 三级</option>
              <option value="blue">🔵 四级</option>
            </select>
            <select class="form-select filter-select" id="statusFilter" onchange="renderAlertList()">
              <option value="">全部状态</option>
              <option value="pending">待处理</option>
              <option value="verifying">待核实</option>
              <option value="reporting">需上报</option>
              <option value="false_alarm">误报</option>
              <option value="done">已办结</option>
            </select>
          </div>
        </div>
        <div class="panel-body">
          <div class="alert-list" id="alertList"></div>
        </div>
      </div>

      <div class="detail-panel" id="detailPanel">
        <div class="panel">
          <div class="panel-header">
            <div class="panel-title">告警详情</div>
            <div id="detailStatusTag"></div>
          </div>
          <div class="panel-body" id="detailBody">
            <div class="empty-state" style="padding:60px 20px;">
              <div class="empty-state-icon">👆</div>
              <div class="empty-state-text">请在左侧选择一条告警查看详情</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let selectedAlertId = null;
    let isPaused = false;
    let readIds = ReadAlerts.get();

    renderTopNav('alerts');
    initFilters();
    renderStats();
    renderAlertList();

    // 检查 URL 参数
    const urlParams = new URLSearchParams(window.location.search);
    const highlightId = urlParams.get('highlight');
    const searchQ = urlParams.get('search');
    if (highlightId) {
      const numId = parseInt(highlightId);
      if (AlertAPI.getById(numId)) {
        selectedAlertId = numId;
        ReadAlerts.add(numId);
        readIds = ReadAlerts.get();
      }
    }
    if (searchQ) {
      document.getElementById('searchInput').value = decodeURIComponent(searchQ);
    }
    if (selectedAlertId) {
      renderAlertList();
      const a = AlertAPI.getById(selectedAlertId);
      if (a) renderDetail(a);
    } else {
      renderAlertList();
    }

    startSimulatedAlerts((newAlert) => {
      if (!isPaused) {
        renderStats();
        renderAlertList();
        showNotification('新告警', `【${PLATFORMS[newAlert.platform].name}】${newAlert.hitWord} - ${newAlert.author}`);
      }
    });

    setInterval(() => {
      if (!isPaused) renderAlertList();
    }, 30000);

    document.getElementById('searchInput').addEventListener('input', renderAlertList);

    function initFilters() {
      const pSelect = document.getElementById('platformFilter');
      Object.entries(PLATFORMS).forEach(([k, v]) => {
        pSelect.innerHTML += `<option value="${k}">${v.icon} ${v.name}</option>`;
      });
      const cSelect = document.getElementById('categoryFilter');
      Object.entries(WORD_CATEGORIES).forEach(([k, v]) => {
        cSelect.innerHTML += `<option value="${k}">${v.icon} ${v.name}</option>`;
      });
    }

    function togglePause() {
      isPaused = !isPaused;
      const btn = document.getElementById('pauseBtn');
      const badge = document.getElementById('liveBadge');
      if (isPaused) {
        btn.innerHTML = '▶ 恢复刷新';
        badge.style.display = 'none';
        showNotification('已暂停', '告警刷新已暂停', 'warning');
      } else {
        btn.innerHTML = '⏸ 暂停刷新';
        badge.style.display = 'inline-flex';
        showNotification('已恢复', '告警实时刷新已恢复', 'success');
      }
    }

    function renderStats() {
      const s = AlertAPI.getStats();
      const processed = s.verifying + s.reporting + s.done;
      const avgResponse = '12.5分';
      const urgentPend = AlertAPI.getAll().filter(a => (a.status === 'pending' || a.status === 'reporting') && a.level === 'red').length;

      const html = [
        renderStatCard({ icon: '📊', title: '今日告警总数', value: s.total, trend: '较昨日 +14.3%', color: 'blue' }),
        renderStatCard({ icon: '⏳', title: '待处理', value: s.pending, trend: '需立即处置', color: 'yellow' }),
        renderStatCard({ icon: '🔍', title: '待核实', value: s.verifying, color: 'cyan' }),
        renderStatCard({ icon: '📤', title: '已上报', value: s.reporting, trend: '2项待反馈', color: 'purple' }),
        renderStatCard({ icon: '🔴', title: '一级告警', value: s.highLevel, trend: `平均响应 ${avgResponse}`, color: 'red' }),
        renderStatCard({ icon: '✅', title: '误报率', value: s.falseAlarmRate, trend: `误报 ${s.falseAlarm} 条`, color: 'green' })
      ].join('');
      document.getElementById('statsGrid').innerHTML = html;
    }

    function renderAlertList() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const platform = document.getElementById('platformFilter').value;
      const category = document.getElementById('categoryFilter').value;
      const level = document.getElementById('levelFilter').value;
      const status = document.getElementById('statusFilter').value;

      let allAlerts = AlertAPI.getAll();
      let filtered = allAlerts.filter(a => {
        if (search && !(a.content.toLowerCase().includes(search) || a.author.toLowerCase().includes(search) || a.hitWord.toLowerCase().includes(search))) return false;
        if (platform && a.platform !== platform) return false;
        if (category && a.category !== category) return false;
        if (level && a.level !== level) return false;
        if (status && a.status !== status) return false;
        return true;
      });

      if (filtered.length === 0) {
        document.getElementById('alertList').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🎉</div>
            <div class="empty-state-text">暂无匹配的告警</div>
          </div>
        `;
        return;
      }

      const html = filtered.map(a => {
        const platformInfo = PLATFORMS[a.platform];
        const isRead = readIds.has(a.id);
        const isSelected = selectedAlertId === a.id;
        const contentHighlighted = a.content.replace(a.hitWord, `<span class="hit-word">${a.hitWord}</span>`);
        const heatColor = getHeatColor(a.heat);

        return `
          <div class="alert-card level-${a.level} ${isRead ? 'read' : ''}" 
               style="${isSelected ? 'background:var(--bg-hover);border-color:var(--accent-blue);' : ''}"
               onclick="selectAlert(${a.id})">
            <div class="alert-header">
              <div class="alert-source">
                <span class="alert-platform">${platformInfo.icon} ${platformInfo.name}</span>
                <span class="tag tag-${WORD_CATEGORIES[a.category].color}">${WORD_CATEGORIES[a.category].icon} ${WORD_CATEGORIES[a.category].name}</span>
                <span class="tag ${getStatusTagClass(a.status)}">${getStatusText(a.status)}</span>
                ${!isRead ? '<span class="alert-pulse"></span>' : ''}
              </div>
              <span class="alert-time">${formatTime(a.createdAt)}</span>
            </div>
            <div class="alert-content">${contentHighlighted}</div>
            <div class="alert-footer">
              <div class="alert-meta">
                <span class="alert-meta-item">👤 ${a.author}</span>
                <span class="alert-meta-item">
                  🔥 ${a.heat}
                  <div class="alert-heat-bar"><div class="alert-heat-fill" style="width:${a.heat}%;background:${heatColor};"></div></div>
                </span>
                <span class="alert-meta-item">🔁 ${formatNumber(a.repost)}</span>
                <span class="alert-meta-item">💬 ${formatNumber(a.comment)}</span>
                <span class="alert-meta-item" style="color:${a.deadline <= 30 ? 'var(--accent-red)' : 'var(--text-secondary)'};">⏱ ${a.deadline}分钟</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('alertList').innerHTML = html;
    }

    function selectAlert(id) {
      selectedAlertId = id;
      ReadAlerts.add(id);
      readIds = ReadAlerts.get();
      const a = AlertAPI.getById(id);
      if (!a) return;
      renderAlertList();
      renderDetail(a);
    }

    function renderDetail(a) {
      const platformInfo = PLATFORMS[a.platform];
      const catInfo = WORD_CATEGORIES[a.category];
      const contentHighlighted = a.content.replace(a.hitWord, `<span class="hit-word">${a.hitWord}</span>`);
      const heatColor = getHeatColor(a.heat);

      const levelText = a.level === 'red' ? '🔴 一级（立即处置）' : a.level === 'orange' ? '🟠 二级（紧急）' : a.level === 'yellow' ? '🟡 三级（关注）' : '🔵 四级（常规）';

      // 获取该告警的操作日志
      const logs = LogAPI.getByAlertId(a.id);
      const logsHTML = logs.length > 0 ? logs.map(log => `
        <div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px dashed var(--border);">
          <div style="flex-shrink:0;">
            <span class="tag ${getLogTypeTagClass(log.type)}" style="font-size:11px;">${getLogTypeText(log.type)}</span>
          </div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:12px;color:var(--text-secondary);margin-bottom:3px;">
              <strong style="color:var(--text-primary);">${log.operator}</strong>
              · ${formatTime(log.createdAt)}
            </div>
            <div style="font-size:13px;">${log.remark}</div>
            ${log.fromStatus && log.toStatus && log.fromStatus !== log.toStatus ? `
              <div style="font-size:11px;color:var(--text-muted);margin-top:3px;">
                ${getStatusText(log.fromStatus)} → ${getStatusText(log.toStatus)}
              </div>
            ` : ''}
          </div>
        </div>
      `).join('') : `
        <div class="empty-state"><div class="empty-state-icon">📝</div><div class="empty-state-text">暂无处置记录</div></div>
      `;

      // 获取该告警的协同跟进记录
      const followUps = FollowUpAPI.getByAlertId(a.id);
      const followTypeInfo = {
        progress: { icon: '📝', tagClass: 'tag-blue', text: '跟进进展' },
        result: { icon: '✅', tagClass: 'tag-green', text: '办结反馈' },
        attachment: { icon: '📎', tagClass: 'tag-purple', text: '附件' }
      };
      const followUpsHTML = followUps.length > 0 ? followUps.map(fu => {
        const info = followTypeInfo[fu.type] || followTypeInfo.progress;
        return `
          <div style="display:flex;gap:10px;padding:10px 0;border-bottom:1px dashed var(--border);">
            <div style="flex-shrink:0;">
              <span class="tag ${info.tagClass}" style="font-size:11px;">${info.icon} ${info.text}</span>
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:12px;color:var(--text-secondary);margin-bottom:3px;">
                <strong style="color:var(--text-primary);">${fu.title || '未命名'}</strong>
                · ${fu.operator} · ${formatTime(fu.createdAt)}
              </div>
              <div style="font-size:13px;">${fu.content || '—'}</div>
              ${fu.attachment ? `
                <div style="margin-top:6px;font-size:12px;">
                  <a href="${fu.attachment.url}" target="_blank" style="color:var(--accent-blue);text-decoration:none;">
                    📎 ${fu.attachment.name}
                  </a>
                </div>
              ` : ''}
            </div>
          </div>
        `;
      }).join('') : `
        <div class="empty-state"><div class="empty-state-icon">🔗</div><div class="empty-state-text">暂无协同跟进记录</div></div>
      `;

      const statusInfoBadge = a.status === 'reporting' && a.reportInfo
        ? `<span class="tag tag-red" style="margin-left:8px;">📤 ${a.reportInfo.department} · ${a.reportInfo.reportedAt}</span>`
        : '';
      const wordRule = WordAPI.getByWord(a.hitWord);
      const ruleBadge = wordRule
        ? `<span class="tag tag-cyan" style="margin-left:8px;cursor:pointer;" onclick="gotoRule('${encodeURIComponent(a.hitWord)}')" title="查看命中规则">📋 ${a.hitWord}${wordRule.enabled ? '' : '（已停用）'}</span>`
        : `<span class="tag tag-gray" style="margin-left:8px;">规则已删除</span>`;

      const html = `
        <div class="detail-section">
          <div class="detail-section-title">基本信息</div>
          <div class="detail-info-grid">
            <div class="detail-info-label">告警ID</div>
            <div class="detail-info-value">#${String(a.id).slice(-6)}${ruleBadge}</div>
            <div class="detail-info-label">来源平台</div>
            <div class="detail-info-value">${platformInfo.icon} ${platformInfo.name}</div>
            <div class="detail-info-label">命中类别</div>
            <div class="detail-info-value"><span class="tag tag-${catInfo.color}">${catInfo.icon} ${catInfo.name}</span></div>
            <div class="detail-info-label">命中词</div>
            <div class="detail-info-value" style="color:var(--accent-red);font-weight:600;">${a.hitWord}</div>
            <div class="detail-info-label">匹配方式</div>
            <div class="detail-info-value">${a.matchType}</div>
            <div class="detail-info-label">告警等级</div>
            <div class="detail-info-value">${levelText}</div>
            <div class="detail-info-label">响应时限</div>
            <div class="detail-info-value" style="color:${a.deadline <= 30 ? 'var(--accent-red)' : 'var(--text-primary)'};">⏱ ${a.deadline} 分钟内</div>
            <div class="detail-info-label">发现时间</div>
            <div class="detail-info-value">${formatFullTime(a.createdAt)}</div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">内容原文</div>
          <div class="detail-text">${contentHighlighted}</div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">上下文分析</div>
          <div class="detail-text" style="background:var(--bg-tertiary);">${a.context}</div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">传播数据</div>
          <div class="detail-info-grid">
            <div class="detail-info-label">作者账号</div>
            <div class="detail-info-value">${a.author}（粉丝 ${formatNumber(a.authorFans)}）</div>
            <div class="detail-info-label">传播热度</div>
            <div class="detail-info-value" style="color:${heatColor};font-weight:600;">🔥 ${a.heat} / 100</div>
            <div class="detail-info-label">转发数</div>
            <div class="detail-info-value">${formatNumber(a.repost)}</div>
            <div class="detail-info-label">评论数</div>
            <div class="detail-info-value">${formatNumber(a.comment)}</div>
            <div class="detail-info-label">点赞数</div>
            <div class="detail-info-value">${formatNumber(a.like)}</div>
            <div class="detail-info-label">原文链接</div>
            <div class="detail-info-value"><a href="${a.url}" target="_blank" style="color:var(--accent-blue);">🔗 查看原文</a></div>
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">处置操作</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <button class="btn btn-success" onclick="updateStatus(${a.id}, 'false_alarm')">🚫 标记误报</button>
            <button class="btn btn-warning" onclick="updateStatus(${a.id}, 'verifying')">🔍 待核实</button>
            <button class="btn btn-danger" onclick="showReportDialog(${a.id})">📤 需上报</button>
            <button class="btn btn-primary" onclick="updateStatus(${a.id}, 'done')">✅ 已办结</button>
          </div>
          <div style="margin-top:12px;">
            <label class="form-label">处置备注</label>
            <textarea class="form-textarea" id="detail-remark" placeholder="记录处置过程、联系的相关部门等信息..."></textarea>
            <button class="btn btn-sm" style="margin-top:8px;" onclick="saveRemark(${a.id})">💾 保存备注</button>
          </div>
        </div>

        ${a.reportInfo ? `
        <div class="detail-section">
          <div class="detail-section-title">📤 上报信息</div>
          <div class="detail-info-grid">
            <div class="detail-info-label">接收部门</div>
            <div class="detail-info-value" style="color:var(--accent-red);font-weight:600;">${a.reportInfo.department}</div>
            <div class="detail-info-label">上报人</div>
            <div class="detail-info-value">${a.reportInfo.reportedBy}</div>
            <div class="detail-info-label">上报时间</div>
            <div class="detail-info-value">${a.reportInfo.reportedAt}</div>
            <div class="detail-info-label">上报说明</div>
            <div class="detail-info-value">${a.reportInfo.note || '—'}</div>
            <div class="detail-info-label">当前状态</div>
            <div class="detail-info-value">
              ${a.status === 'done' 
                ? '<span class="tag tag-green">✅ 已办结</span>' 
                : a.status === 'reporting' 
                  ? '<span class="tag tag-red">⏳ 待反馈</span>' 
                  : `<span class="tag ${getStatusTagClass(a.status)}">${getStatusText(a.status)}</span>`}
            </div>
          </div>
        </div>
        ` : ''}

        <div class="detail-section">
          <div class="detail-section-title">
            🔍 研判结论
            ${a.judgment ? `
              <span style="margin-left:8px;">
                <button class="btn btn-xs" onclick="toggleJudgmentEdit(${a.id})" id="judgmentToggleBtn">✏️ 编辑</button>
              </span>
            ` : ''}
          </div>
          ${a.judgment ? `
            <div id="judgmentView">
              <div class="detail-info-grid">
                <div class="detail-info-label">事件性质</div>
                <div class="detail-info-value">${a.judgment.nature || '—'}</div>
                <div class="detail-info-label">影响范围</div>
                <div class="detail-info-value">${a.judgment.scope || '—'}</div>
                <div class="detail-info-label">建议口径</div>
                <div class="detail-info-value">${a.judgment.response || '—'}</div>
                <div class="detail-info-label">风险等级</div>
                <div class="detail-info-value">
                  ${a.judgment.riskLevel 
                    ? `<span class="tag ${a.judgment.riskLevel === '高' ? 'tag-red' : a.judgment.riskLevel === '中' ? 'tag-orange' : a.judgment.riskLevel === '低' ? 'tag-green' : 'tag-gray'}">${a.judgment.riskLevel}风险</span>` 
                    : '—'}
                </div>
                <div class="detail-info-label">研判人</div>
                <div class="detail-info-value">${a.judgment.savedBy}</div>
                <div class="detail-info-label">研判时间</div>
                <div class="detail-info-value">${a.judgment.savedAt}</div>
              </div>
            </div>
            <div id="judgmentEdit" style="display:none;">
          ` : `
            <div id="judgmentEdit">
          `}
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
              <div>
                <label class="form-label">事件性质</label>
                <input type="text" class="form-input" id="judgment-nature" placeholder="如：涉稳群体性事件、一般谣言..." value="${a.judgment?.nature || ''}">
              </div>
              <div>
                <label class="form-label">风险等级</label>
                <select class="form-select" id="judgment-risk">
                  <option value="">请选择</option>
                  <option value="高" ${a.judgment?.riskLevel === '高' ? 'selected' : ''}>🔴 高风险</option>
                  <option value="中" ${a.judgment?.riskLevel === '中' ? 'selected' : ''}>🟠 中风险</option>
                  <option value="低" ${a.judgment?.riskLevel === '低' ? 'selected' : ''}>🟢 低风险</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">影响范围</label>
              <textarea class="form-textarea" id="judgment-scope" style="min-height:60px;" placeholder="如：涉及XX区、涉事人数约XX人、传播范围XX平台...">${a.judgment?.scope || ''}</textarea>
            </div>
            <div class="form-group">
              <label class="form-label">建议口径</label>
              <textarea class="form-textarea" id="judgment-response" style="min-height:60px;" placeholder="对外回应口径、需协调部门、注意事项...">${a.judgment?.response || ''}</textarea>
            </div>
            <div style="display:flex;gap:8px;">
              <button class="btn btn-sm btn-primary" onclick="saveJudgment(${a.id})">💾 保存研判结论</button>
              ${a.judgment ? `<button class="btn btn-sm" onclick="toggleJudgmentEdit(${a.id}, true)">取消</button>` : ''}
            </div>
          </div>
        </div>

        ${(a.status === 'reporting' || a.status === 'verifying') ? `
        <div class="detail-section">
          <div class="detail-section-title">➕ 添加协同跟进记录</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;">
            <select class="form-select" id="followType">
              <option value="progress">📝 跟进进展</option>
              <option value="result">✅ 办结反馈</option>
              <option value="attachment">📎 附件链接</option>
            </select>
            <input type="text" class="form-input" id="followTitle" placeholder="简要标题（如：已电话联系）">
          </div>
          <textarea class="form-textarea" id="followContent" style="min-height:70px;margin-bottom:8px;" placeholder="详细描述处理进展、联系结果、处置意见等..."></textarea>
          <div id="followAttachmentBlock" style="display:none;margin-bottom:8px;">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
              <input type="text" class="form-input" id="followAttachmentName" placeholder="附件名称">
              <input type="text" class="form-input" id="followAttachmentUrl" placeholder="附件链接（内网/OA/网盘）">
            </div>
          </div>
          <button class="btn btn-sm btn-primary" style="width:100%;" onclick="addFollowUp(${a.id})">💾 保存跟进记录</button>
        </div>
        ` : ''}

        <div class="detail-section">
          <div class="detail-section-title">🔗 协同跟进记录时间线</div>
          <div style="max-height:300px;overflow-y:auto;">
            ${followUpsHTML}
          </div>
        </div>

        <div class="detail-section">
          <div class="detail-section-title">📜 处置记录时间线</div>
          <div style="max-height:260px;overflow-y:auto;">
            ${logsHTML}
          </div>
        </div>
      `;
      document.getElementById('detailBody').innerHTML = html;
      document.getElementById('detailStatusTag').innerHTML = `<span class="tag ${getStatusTagClass(a.status)}">${getStatusText(a.status)}</span>`;

      // 绑定跟进类型切换
      const followType = document.getElementById('followType');
      if (followType) {
        followType.addEventListener('change', function() {
          const block = document.getElementById('followAttachmentBlock');
          if (this.value === 'attachment') {
            block.style.display = 'block';
          } else {
            block.style.display = 'none';
          }
        });
      }
    }

    function updateStatus(id, status) {
      const remarkEl = document.getElementById('detail-remark');
      const remark = remarkEl?.value?.trim() || '';
      
      const alert = AlertAPI.updateStatus(id, status, remark);
      if (!alert) return;

      renderStats();
      renderAlertList();
      renderDetail(alert);
      showNotification('状态已更新', `告警已标记为「${getStatusText(status)}」`, 'success');
    }

    function showReportDialog(id) {
      const alert = AlertAPI.getById(id);
      if (!alert) return;
      showModal(`📤 上报告警 #${String(id).slice(-6)}`, `
        <div style="padding:4px 0;">
          <div style="background:var(--bg-tertiary);padding:12px;border-radius:6px;margin-bottom:16px;font-size:13px;color:var(--text-secondary);">
            <strong style="color:var(--text-primary);">${alert.hitWord}</strong>
            · ${alert.content.length > 50 ? alert.content.slice(0, 50) + '...' : alert.content}
          </div>
          <div class="form-group">
            <label class="form-label">接收部门 <span style="color:var(--accent-red);">*</span></label>
            <select class="form-select" id="reportDept">
              <option value="">请选择接收部门</option>
              <option>市委宣传部舆情处</option>
              <option>市公安局网安支队</option>
              <option>市网信办网络管理处</option>
              <option>市委政法委综治处</option>
              <option>市应急管理局</option>
              <option>市卫健委宣传处</option>
              <option>区县对应部门</option>
              <option>其他（请在说明中注明）</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">上报说明</label>
            <textarea class="form-textarea" id="reportNote" style="min-height:90px;" placeholder="请简要说明上报原因、涉及范围、需要协同处置的事项等..."></textarea>
          </div>
        </div>
      `, () => {
        const dept = document.getElementById('reportDept').value;
        const note = document.getElementById('reportNote').value.trim();
        if (!dept) {
          showNotification('请选择接收部门', '', 'warning');
          return false;
        }
        const updated = AlertAPI.report(id, dept, note);
        if (updated) {
          renderStats();
          renderAlertList();
          renderDetail(updated);
          showNotification('上报成功', `已提交至「${dept}」`, 'success');
        }
      });
    }

    function saveRemark(id) {
      const remarkEl = document.getElementById('detail-remark');
      const remark = remarkEl?.value?.trim();
      if (!remark) {
        showNotification('请输入备注内容', '', 'warning');
        return;
      }
      AlertAPI.addRemark(id, remark);
      const a = AlertAPI.getById(id);
      if (a) renderDetail(a);
      showNotification('备注已保存', '', 'success');
    }

    function markAllRead() {
      ReadAlerts.markAll();
      readIds = ReadAlerts.get();
      renderAlertList();
      showNotification('操作成功', '所有告警已标记为已读', 'success');
    }

    function addFollowUp(id) {
      const typeEl = document.getElementById('followType');
      const titleEl = document.getElementById('followTitle');
      const contentEl = document.getElementById('followContent');
      const attachNameEl = document.getElementById('followAttachmentName');
      const attachUrlEl = document.getElementById('followAttachmentUrl');

      const type = typeEl?.value || 'progress';
      const title = titleEl?.value?.trim();
      const content = contentEl?.value?.trim();

      if (!title || !content) {
        showNotification('请填写完整', '标题和内容不能为空', 'warning');
        return;
      }

      let attachment = null;
      if (type === 'attachment') {
        const name = attachNameEl?.value?.trim();
        const url = attachUrlEl?.value?.trim();
        if (!name || !url) {
          showNotification('请填写附件信息', '附件名称和链接不能为空', 'warning');
          return;
        }
        attachment = { name, url };
      }

      const record = FollowUpAPI.add({
        alertId: id,
        type,
        title,
        content,
        attachment
      });

      if (record) {
        const alert = AlertAPI.getById(id);
        renderDetail(alert);
        showNotification('保存成功', `已添加${type === 'progress' ? '跟进进展' : type === 'result' ? '办结反馈' : '附件'}`, 'success');
      }
    }

    function gotoRule(word) {
      window.location.href = `rules.html?search=${encodeURIComponent(word)}`;
    }

    function saveJudgment(id) {
      const nature = document.getElementById('judgment-nature').value.trim();
      const scope = document.getElementById('judgment-scope').value.trim();
      const response = document.getElementById('judgment-response').value.trim();
      const riskLevel = document.getElementById('judgment-risk').value;

      if (!nature && !scope && !response && !riskLevel) {
        showNotification('请至少填写一项', '', 'warning');
        return;
      }

      const alert = AlertAPI.updateJudgment(id, { nature, scope, response, riskLevel });
      if (alert) {
        renderDetail(alert);
        showNotification('研判结论已保存', '交接班页和复盘均可引用', 'success');
      }
    }

    function toggleJudgmentEdit(id, cancel = false) {
      const viewEl = document.getElementById('judgmentView');
      const editEl = document.getElementById('judgmentEdit');
      const btnEl = document.getElementById('judgmentToggleBtn');
      if (!viewEl || !editEl) return;

      if (viewEl.style.display !== 'none') {
        viewEl.style.display = 'none';
        editEl.style.display = 'block';
        if (btnEl) btnEl.textContent = '👁 查看';
      } else {
        if (cancel) {
          // 取消则重新渲染恢复原值
          const alert = AlertAPI.getById(id);
          if (alert) renderDetail(alert);
        } else {
          viewEl.style.display = 'block';
          editEl.style.display = 'none';
          if (btnEl) btnEl.textContent = '✏️ 编辑';
        }
      }
    }
  </script>
</body>
</html>
