<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>敏感词规则管理 - 舆情告警工作台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="main-container" id="mainContent">
    <div class="page-header">
      <div class="page-title-block">
        <h1>📋 敏感词规则管理</h1>
        <p>维护敏感词库，设置匹配方式和处置等级，规则生效后将用于全网内容扫描</p>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="exportRules()">⬇ 导出规则</button>
        <button class="btn" onclick="openBatchImportModal()">📥 批量导入</button>
        <button class="btn" onclick="restoreDefaultWords()">↩ 恢复默认</button>
        <button class="btn btn-danger" onclick="clearAllWords()">🗑 清空全部</button>
        <button class="btn btn-primary" onclick="openAddModal()">＋ 新增敏感词</button>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="panel">
      <div class="panel-header">
        <div class="category-tabs" id="categoryTabs"></div>
        <div class="filter-bar" style="margin-bottom:0;">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索敏感词、备注或创建人...">
          </div>
          <select class="form-select filter-select" id="matchTypeFilter" onchange="renderRulesTable()">
            <option value="">全部匹配方式</option>
            <option value="exact">精确命中</option>
            <option value="fuzzy">近似命中</option>
          </select>
          <select class="form-select filter-select" id="levelFilter" onchange="renderRulesTable()">
            <option value="">全部处置等级</option>
            <option value="一级">一级（红色）</option>
            <option value="二级">二级（橙色）</option>
            <option value="三级">三级（黄色）</option>
            <option value="四级">四级（蓝色）</option>
          </select>
          <select class="form-select filter-select" id="statusFilter" onchange="renderRulesTable()">
            <option value="">全部状态</option>
            <option value="enabled">已启用</option>
            <option value="disabled">已停用</option>
          </select>
        </div>
      </div>
      <div style="overflow-x:auto;">
        <table class="data-table">
          <thead>
            <tr>
              <th style="width:80px;">状态</th>
              <th>敏感词</th>
              <th style="width:100px;">所属类别</th>
              <th style="width:100px;">匹配方式</th>
              <th style="width:100px;">处置等级</th>
              <th style="width:100px;">命中次数</th>
              <th>备注说明</th>
              <th style="width:110px;">创建人/时间</th>
              <th style="width:140px;">操作</th>
            </tr>
          </thead>
          <tbody id="rulesTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let currentCategory = 'all';
    let editingRuleId = null;

    renderTopNav('rules');
    renderStats();
    renderCategoryTabs();
    renderRulesTable();

    document.getElementById('searchInput').addEventListener('input', renderRulesTable);

    function renderStats() {
      const s = WordAPI.getStats();
      const html = [
        renderStatCard({ icon: '📝', title: '规则总数', value: s.total, trend: '较昨日 +3', color: 'blue' }),
        renderStatCard({ icon: '✅', title: '已启用', value: s.enabled, trend: `启用率 ${s.total ? ((s.enabled/s.total)*100).toFixed(0) : 0}%`, color: 'green' }),
        renderStatCard({ icon: '⏸️', title: '已停用', value: s.disabled, color: 'purple' }),
        renderStatCard({ icon: '🎯', title: '总命中次数', value: s.totalHits.toLocaleString(), trend: '今日 +186', color: 'cyan' }),
        renderStatCard({ icon: '🔴', title: '一级规则', value: s.level1, color: 'red' }),
        renderStatCard({ icon: '🟠', title: '二级规则', value: s.level2, color: 'orange' })
      ].join('');
      document.getElementById('statsGrid').innerHTML = html;
    }

    function renderCategoryTabs() {
      const s = WordAPI.getStats();
      const tabs = [{ key: 'all', name: '全部', icon: '📂', count: s.total }];
      Object.entries(WORD_CATEGORIES).forEach(([key, info]) => {
        tabs.push({ key, name: info.name, icon: info.icon, count: s.byCategory[key] || 0 });
      });

      const html = tabs.map(t => `
        <div class="category-tab ${currentCategory === t.key ? 'active' : ''}" onclick="setCategory('${t.key}')">
          <span>${t.icon}</span> ${t.name} <span class="count">${t.count}</span>
        </div>
      `).join('');
      document.getElementById('categoryTabs').innerHTML = html;
    }

    function setCategory(key) {
      currentCategory = key;
      renderCategoryTabs();
      renderRulesTable();
    }

    function renderRulesTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const matchType = document.getElementById('matchTypeFilter').value;
      const level = document.getElementById('levelFilter').value;
      const status = document.getElementById('statusFilter').value;

      let words = WordAPI.getByCategory(currentCategory);
      let filtered = words.filter(w => {
        if (search && !(w.word.toLowerCase().includes(search) || w.remark.toLowerCase().includes(search) || w.creator.toLowerCase().includes(search))) return false;
        if (matchType && w.matchType !== matchType) return false;
        if (level && w.level !== level) return false;
        if (status === 'enabled' && !w.enabled) return false;
        if (status === 'disabled' && w.enabled) return false;
        return true;
      });

      if (filtered.length === 0) {
        document.getElementById('rulesTableBody').innerHTML = `
          <tr><td colspan="9">
            <div class="empty-state">
              <div class="empty-state-icon">📭</div>
              <div class="empty-state-text">暂无匹配的规则，试试调整筛选条件</div>
            </div>
          </td></tr>
        `;
        return;
      }

      const html = filtered.map(w => {
        const catInfo = WORD_CATEGORIES[w.category];
        const levelClass = w.level === '一级' ? 'tag-red' : w.level === '二级' ? 'tag-orange' : w.level === '三级' ? 'tag-yellow' : 'tag-blue';
        const matchClass = w.matchType === 'exact' ? 'tag-purple' : 'tag-cyan';
        const catClass = 'tag-' + catInfo.color;

        return `
          <tr>
            <td>
              <label class="switch">
                <input type="checkbox" ${w.enabled ? 'checked' : ''} onchange="toggleEnabled(${w.id})">
                <span class="switch-slider"></span>
              </label>
            </td>
            <td><strong style="font-size:14px;">${w.word}</strong></td>
            <td><span class="tag ${catClass}">${catInfo.icon} ${catInfo.name}</span></td>
            <td><span class="tag ${matchClass}">${w.matchType === 'exact' ? '🎯 精确命中' : '🔍 近似命中'}</span></td>
            <td><span class="tag ${levelClass}">${w.level}</span></td>
            <td><strong style="color:var(--accent-cyan);">${w.hitCount.toLocaleString()}</strong></td>
            <td style="color:var(--text-secondary);">${w.remark || '—'}</td>
            <td style="font-size:12px;color:var(--text-muted);">${w.creator}<br>${w.createdAt}</td>
            <td>
              <button class="btn btn-sm btn-ghost" onclick="openEditModal(${w.id})" title="编辑">✏️</button>
              <button class="btn btn-sm btn-ghost" onclick="duplicateRule(${w.id})" title="复制">📋</button>
              <button class="btn btn-sm btn-ghost" style="color:var(--accent-red);" onclick="deleteRule(${w.id})" title="删除">🗑️</button>
            </td>
          </tr>
        `;
      }).join('');
      document.getElementById('rulesTableBody').innerHTML = html;
    }

    function toggleEnabled(id) {
      const word = WordAPI.toggleEnabled(id);
      if (word) {
        renderStats();
        renderCategoryTabs();
        showNotification('操作成功', `敏感词"${word.word}"已${word.enabled ? '启用' : '停用'}`, 'success');
      }
    }

    function openAddModal() {
      editingRuleId = null;
      showRuleForm();
    }

    function openEditModal(id) {
      editingRuleId = id;
      showRuleForm(WordAPI.getById(id));
    }

    function showRuleForm(word) {
      const isEdit = !!word;
      const formHTML = `
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">敏感词 *</label>
            <input type="text" class="form-input" id="f-word" value="${word?.word || ''}" placeholder="请输入敏感词" oninput="checkDuplicateWord()">
            <div id="dup-tip" style="font-size:12px;color:var(--text-muted);margin-top:6px;">
              输入后自动检测是否重复
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">所属类别 *</label>
            <select class="form-select" id="f-category">
              ${Object.entries(WORD_CATEGORIES).map(([k, i]) => `
                <option value="${k}" ${word?.category === k ? 'selected' : ''}>${i.icon} ${i.name}（${i.level}）</option>
              `).join('')}
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">匹配方式 *</label>
            <select class="form-select" id="f-matchType">
              <option value="exact" ${word?.matchType === 'exact' ? 'selected' : ''}>🎯 精确命中</option>
              <option value="fuzzy" ${word?.matchType === 'fuzzy' ? 'selected' : ''}>🔍 近似命中（含变体、近义）</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">处置等级 *</label>
            <select class="form-select" id="f-level">
              <option value="一级" ${word?.level === '一级' ? 'selected' : ''}>🔴 一级 - 立即上报处置</option>
              <option value="二级" ${word?.level === '二级' ? 'selected' : ''}>🟠 二级 - 30分钟内响应</option>
              <option value="三级" ${word?.level === '三级' ? 'selected' : ''}>🟡 三级 - 1小时内核实</option>
              <option value="四级" ${word?.level === '四级' ? 'selected' : ''}>🔵 四级 - 关注即可</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">备注说明</label>
          <textarea class="form-textarea" id="f-remark" placeholder="请输入该敏感词的使用场景、处置建议等说明信息">${word?.remark || ''}</textarea>
        </div>
      `;

      showModal(isEdit ? '编辑敏感词' : '新增敏感词', formHTML, (overlay) => {
        const w = overlay.querySelector('#f-word').value.trim();
        if (!w) { showNotification('验证失败', '请输入敏感词', 'warning'); return false; }

        // 检查重复
        if (!isEdit && WordAPI.exists(w)) {
          showNotification('重复提醒', `"${w}" 已在规则库中`, 'warning');
          return false;
        }
        if (isEdit && WordAPI.exists(w, word.id)) {
          showNotification('重复提醒', `"${w}" 已在规则库中`, 'warning');
          return false;
        }

        const cat = overlay.querySelector('#f-category').value;
        const matchType = overlay.querySelector('#f-matchType').value;
        const level = overlay.querySelector('#f-level').value;
        const remark = overlay.querySelector('#f-remark').value.trim();

        if (isEdit) {
          WordAPI.update(word.id, { word: w, category: cat, matchType, level, remark });
          showNotification('修改成功', `敏感词"${w}"已更新`, 'success');
        } else {
          WordAPI.add({ word: w, category: cat, matchType, level, remark, enabled: true });
          showNotification('新增成功', `敏感词"${w}"已加入规则库`, 'success');
        }
        renderStats();
        renderCategoryTabs();
        renderRulesTable();
      });
    }

    function checkDuplicateWord() {
      const input = document.querySelector('#f-word');
      const tip = document.querySelector('#dup-tip');
      if (!input || !tip) return;
      const val = input.value.trim();
      if (!val) {
        tip.innerHTML = '输入后自动检测是否重复';
        tip.style.color = 'var(--text-muted)';
        return;
      }
      const excludeId = editingRuleId || null;
      if (WordAPI.exists(val, excludeId)) {
        tip.innerHTML = `⚠️ <strong style="color:var(--accent-red);">"${val}" 已在规则库中</strong>`;
        tip.style.color = 'var(--accent-red)';
        return;
      }
      const fuzzyMatches = WordAPI.fuzzyExists(val, excludeId);
      if (fuzzyMatches.length > 0) {
        tip.innerHTML = `💡 发现 ${fuzzyMatches.length} 个相似词：${fuzzyMatches.slice(0,3).map(w => w.word).join('、')}${fuzzyMatches.length > 3 ? '...' : ''}`;
        tip.style.color = 'var(--accent-yellow)';
        return;
      }
      tip.innerHTML = '✅ 无重复，可正常添加';
      tip.style.color = 'var(--accent-green)';
    }

    function duplicateRule(id) {
      const word = WordAPI.getById(id);
      if (word) {
        const newWord = WordAPI.add({
          ...word,
          word: word.word + ' (副本)',
          hitCount: 0
        });
        renderStats();
        renderCategoryTabs();
        renderRulesTable();
        showNotification('复制成功', `已复制敏感词"${word.word}"`, 'success');
      }
    }

    function deleteRule(id) {
      const word = WordAPI.getById(id);
      if (!word) return;
      showModal('确认删除', `
        <p style="padding:12px 0;">确定要删除敏感词<strong style="color:var(--accent-red);">「${word.word}」</strong>吗？</p>
        <p style="font-size:12px;color:var(--text-muted);">删除后该规则将不再生效，此操作不可撤销。</p>
      `, () => {
        WordAPI.remove(id);
        renderStats();
        renderCategoryTabs();
        renderRulesTable();
        showNotification('删除成功', `敏感词"${word.word}"已删除`, 'success');
      });
    }

    function exportRules() {
      const words = WordAPI.getAll();
      const data = words.map(w => `${w.word},${WORD_CATEGORIES[w.category].name},${w.matchType === 'exact' ? '精确' : '近似'},${w.level},${w.enabled ? '启用' : '停用'},${w.remark}`).join('\n');
      const blob = new Blob([`敏感词,类别,匹配方式,等级,状态,备注\n${data}`], { type: 'text/csv;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `敏感词规则_${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
      showNotification('导出成功', `已导出 ${words.length} 条规则`, 'success');
    }

    // ==========================================
    // 批量导入
    // ==========================================
    let parsedImportItems = []; // 存放解析后的候选词
    let importFileRawText = ''; // 存放文件读取后的文本

    function parseCategoryName(name) {
      if (!name) return null;
      const key = Object.keys(WORD_CATEGORIES).find(k =>
        WORD_CATEGORIES[k].name === name.trim() || k === name.trim().toLowerCase()
      );
      return key || null;
    }
    function parseMatchType(s) {
      if (!s) return null;
      s = s.trim().toLowerCase();
      if (s.includes('近似') || s === 'fuzzy') return 'fuzzy';
      if (s.includes('精确') || s === 'exact') return 'exact';
      return null;
    }
    function parseLevel(s) {
      if (!s) return null;
      s = s.trim();
      if (s.includes('一') || s === '1' || s === '一级') return '一级';
      if (s.includes('二') || s === '2' || s === '二级') return '二级';
      if (s.includes('三') || s === '3' || s === '三级') return '三级';
      if (s.includes('四') || s === '4' || s === '四级') return '四级';
      return null;
    }

    // 解析 CSV / 文本，返回带状态的数组 [{word,category,matchType,level,remark,status: 'ok'|'dup'|'empty',reason}]
    function parseImportText(text, defaultCategory, defaultMatch, defaultLevel) {
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      const results = [];
      lines.forEach(line => {
        // 处理 CSV，兼容引号
        const parts = [];
        let cur = '', inQuote = false;
        for (let i = 0; i < line.length; i++) {
          const ch = line[i];
          if (ch === '"') { inQuote = !inQuote; continue; }
          if (ch === ',' && !inQuote) { parts.push(cur); cur = ''; continue; }
          cur += ch;
        }
        parts.push(cur);
        const cols = parts.map(p => p.trim());

        const word = cols[0];
        if (!word) {
          results.push({ word: '', status: 'empty', reason: '词为空' });
          return;
        }

        let category = parseCategoryName(cols[1]) || defaultCategory;
        let matchType = parseMatchType(cols[2]) || defaultMatch;
        let level = parseLevel(cols[3]) || defaultLevel;
        const remark = cols[4] || '';

        let status = 'ok', reason = '';
        if (WordAPI.exists(word)) {
          status = 'dup';
          reason = '词已存在';
        } else {
          const fuzzy = WordAPI.fuzzyExists(word);
          if (fuzzy.length > 0) {
            status = 'fuzzy';
            reason = `与「${fuzzy[0].word}」相似`;
          }
        }

        results.push({ word, category, matchType, level, remark, status, reason });
      });
      return results;
    }

    function renderImportPreview(modal) {
      const preview = modal.querySelector('#import-preview');
      const list = modal.querySelector('#import-preview-list');
      const stats = modal.querySelector('#import-stats');
      if (!parsedImportItems.length) {
        preview.style.display = 'none';
        return;
      }
      preview.style.display = 'block';
      const okCount = parsedImportItems.filter(i => i.status === 'ok' || i.status === 'fuzzy').length;
      const dupCount = parsedImportItems.filter(i => i.status === 'dup').length;
      const emptyCount = parsedImportItems.filter(i => i.status === 'empty').length;

      stats.innerHTML = `
        <span style="color:var(--accent-green);">✔ 可导入 ${okCount}</span>
        <span style="color:var(--accent-orange);margin-left:16px;">⚠ 相似/重复 ${dupCount}</span>
        ${emptyCount > 0 ? `<span style="color:var(--text-muted);margin-left:16px;">✘ 空行 ${emptyCount}</span>` : ''}
      `;

      const statusTagMap = {
        ok: '<span class="tag tag-green" style="font-size:10px;">可导入</span>',
        fuzzy: '<span class="tag tag-yellow" style="font-size:10px;">相似</span>',
        dup: '<span class="tag tag-red" style="font-size:10px;">已存在</span>',
        empty: '<span class="tag tag-gray" style="font-size:10px;">空行</span>'
      };

      const rows = parsedImportItems.slice(0, 50).map(item => {
        const catInfo = WORD_CATEGORIES[item.category] || WORD_CATEGORIES.other;
        const matchTxt = item.matchType === 'fuzzy' ? '🔍 近似' : '🎯 精确';
        return `
          <tr style="${item.status === 'dup' || item.status === 'empty' ? 'opacity:0.4;' : ''}">
            <td style="padding:4px 6px;">${statusTagMap[item.status] || ''}</td>
            <td style="padding:4px 6px;font-weight:600;">${item.word || '-'}</td>
            <td style="padding:4px 6px;"><span class="tag tag-${catInfo.color}" style="font-size:10px;">${catInfo.icon} ${catInfo.name}</span></td>
            <td style="padding:4px 6px;">${matchTxt}</td>
            <td style="padding:4px 6px;">${item.level}</td>
            <td style="padding:4px 6px;color:var(--text-muted);font-size:11px;">${item.reason || item.remark || '-'}</td>
          </tr>
        `;
      }).join('');

      list.innerHTML = `
        <table style="width:100%;border-collapse:collapse;font-size:12px;">
          <thead style="color:var(--text-muted);font-size:11px;">
            <tr>
              <th style="padding:4px 6px;text-align:left;width:60px;">状态</th>
              <th style="padding:4px 6px;text-align:left;">敏感词</th>
              <th style="padding:4px 6px;text-align:left;width:80px;">类别</th>
              <th style="padding:4px 6px;text-align:left;width:60px;">匹配</th>
              <th style="padding:4px 6px;text-align:left;width:50px;">等级</th>
              <th style="padding:4px 6px;text-align:left;">说明</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
        ${parsedImportItems.length > 50 ? `<div style="padding:4px 6px;color:var(--text-muted);font-size:11px;">... 仅显示前 50 条，共 ${parsedImportItems.length} 行</div>` : ''}
      `;
    }

    function reparseImportText(modal) {
      const defaultCategory = modal.querySelector('#import-default-category').value;
      const defaultMatch = modal.querySelector('#import-default-match').value;
      const defaultLevel = modal.querySelector('#import-default-level').value;

      let text = '';
      if (currentImportMode === 'text') {
        text = modal.querySelector('#import-text').value;
      } else {
        text = importFileRawText;
      }
      parsedImportItems = parseImportText(text, defaultCategory, defaultMatch, defaultLevel);
      renderImportPreview(modal);
    }

    function openBatchImportModal() {
      parsedImportItems = [];
      importFileRawText = '';
      currentImportMode = 'text';

      const formHTML = `
        <div style="margin-bottom:14px;">
          <div class="form-label">导入方式</div>
          <div style="display:flex;gap:8px;margin-bottom:10px;">
            <button class="btn btn-primary" onclick="switchImportMode('text')" id="mode-text">📝 文本粘贴</button>
            <button class="btn" onclick="switchImportMode('file')" id="mode-file">📁 CSV 上传</button>
          </div>
        </div>

        <div id="import-mode-text">
          <div class="form-group">
            <label class="form-label">每行一个敏感词，支持格式：</label>
            <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;line-height:1.6;">
              格式1（纯文本）：<code>敏感词</code><br>
              格式2（完整）：<code>敏感词,类别,匹配方式,等级,备注</code><br>
              例：<code style="background:var(--bg-primary);padding:2px 6px;border-radius:4px;">暴力事件,涉稳,精确,二级,群体性事件预警</code>
            </div>
            <textarea class="form-textarea" id="import-text" style="min-height:150px;font-family:Consolas,monospace;font-size:12px;" placeholder="暴力事件&#10;上访&#10;谣言,谣言,近似,三级,谣言类敏感词"></textarea>
          </div>
        </div>

        <div id="import-mode-file" style="display:none;">
          <div class="form-group">
            <label class="form-label">上传 CSV 文件</label>
            <input type="file" id="import-file" accept=".csv,.txt" class="form-input" style="padding:6px;">
            <div style="font-size:12px;color:var(--text-muted);margin-top:8px;">
              CSV 列顺序：<code>敏感词, 类别, 匹配方式, 等级, 备注</code>（类别可用中文名「涉政/涉稳/灾害」等，匹配支持「精确/近似」，等级支持「一级/二级/三级/四级」）
            </div>
            <div id="import-file-status" style="font-size:12px;color:var(--text-muted);margin-top:6px;display:none;"></div>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">默认类别</label>
            <select class="form-select" id="import-default-category">
              ${Object.entries(WORD_CATEGORIES).map(([k, i]) => `<option value="${k}">${i.icon} ${i.name}</option>`).join('')}
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">默认匹配</label>
            <select class="form-select" id="import-default-match">
              <option value="exact">🎯 精确命中</option>
              <option value="fuzzy">🔍 近似命中</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">默认等级</label>
            <select class="form-select" id="import-default-level">
              <option value="一级">🔴 一级</option>
              <option value="二级" selected>🟠 二级</option>
              <option value="三级">🟡 三级</option>
              <option value="四级">🔵 四级</option>
            </select>
          </div>
        </div>

        <div id="import-preview" style="display:none;margin-top:12px;">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <div class="form-label" style="margin:0;">导入预览</div>
            <div id="import-stats" style="font-size:12px;"></div>
          </div>
          <div id="import-preview-list" style="max-height:220px;overflow-y:auto;background:var(--bg-primary);border-radius:6px;padding:6px;border:1px solid var(--border);"></div>
        </div>
      `;

      const modal = showModal('📥 批量导入敏感词', formHTML, (overlay) => {
        // 先重新解析一次以确保最新
        reparseImportText(overlay);
        const items = parsedImportItems.filter(i => i.status === 'ok' || i.status === 'fuzzy');
        if (items.length === 0) {
          showNotification('无有效数据', '请检查输入内容或默认设置', 'warning');
          return false;
        }
        const result = WordAPI.batchImport(items);
        renderStats();
        renderCategoryTabs();
        renderRulesTable();

        let msg = `成功导入 ${result.success} 条`;
        if (result.skipped > 0) msg += `，跳过 ${result.skipped} 条`;
        showNotification('导入完成', msg, result.success > 0 ? 'success' : 'warning');
      });

      // 绑定切换
      modal.querySelector('#mode-text').onclick = () => {
        switchImportMode('text', modal);
        reparseImportText(modal);
      };
      modal.querySelector('#mode-file').onclick = () => {
        switchImportMode('file', modal);
        reparseImportText(modal);
      };
      modal.querySelector('#import-text').addEventListener('input', () => reparseImportText(modal));
      modal.querySelector('#import-default-category').addEventListener('change', () => reparseImportText(modal));
      modal.querySelector('#import-default-match').addEventListener('change', () => reparseImportText(modal));
      modal.querySelector('#import-default-level').addEventListener('change', () => reparseImportText(modal));
      modal.querySelector('#import-file').addEventListener('change', (e) => {
        const file = e.target.files?.[0];
        if (!file) return;
        const status = modal.querySelector('#import-file-status');
        status.style.display = 'block';
        status.textContent = `⏳ 正在读取 ${file.name} ...`;
        const reader = new FileReader();
        reader.onload = (ev) => {
          importFileRawText = ev.target.result || '';
          status.textContent = `✔ 已读取 ${file.name}（${importFileRawText.split(/\r?\n/).filter(l=>l.trim()).length} 行）`;
          status.style.color = 'var(--accent-green)';
          reparseImportText(modal);
        };
        reader.onerror = () => {
          status.textContent = '✘ 读取失败，请重试';
          status.style.color = 'var(--accent-red)';
        };
        reader.readAsText(file, 'UTF-8');
      });
    }

    let currentImportMode = 'text';
    function switchImportMode(mode, modal) {
      currentImportMode = mode;
      const m = modal || document;
      const textBtn = m.querySelector('#mode-text');
      const fileBtn = m.querySelector('#mode-file');
      const textPanel = m.querySelector('#import-mode-text');
      const filePanel = m.querySelector('#import-mode-file');

      if (mode === 'text') {
        textBtn.className = 'btn btn-primary';
        fileBtn.className = 'btn';
        textPanel.style.display = 'block';
        filePanel.style.display = 'none';
      } else {
        textBtn.className = 'btn';
        fileBtn.className = 'btn btn-primary';
        textPanel.style.display = 'none';
        filePanel.style.display = 'block';
      }
    }

    function clearAllWords() {
      const total = WordAPI.getAll().length;
      if (total === 0) {
        showNotification('规则库已为空', '无需清空', 'info');
        return;
      }
      showModal('⚠️ 确认清空全部规则', `
        <div style="padding:8px 0;">
          <p style="margin-bottom:12px;">确定要清空 <strong style="color:var(--accent-red);">${total} 条</strong> 敏感词规则吗？</p>
          <div style="background:var(--accent-red)10;color:var(--accent-red);padding:10px;border-radius:6px;font-size:12px;">
            ⚠ 清空后刷新页面和切换页面也不会恢复，只能手动重新录入或使用「恢复默认」功能。
          </div>
        </div>
      `, () => {
        WordAPI.clear();
        renderStats();
        renderCategoryTabs();
        renderRulesTable();
        showNotification('已清空', `规则库已清空（${total} 条规则已删除）`, 'success');
      });
    }

    function restoreDefaultWords() {
      showModal('↩ 恢复默认规则', `
        <div style="padding:8px 0;">
          <p style="margin-bottom:8px;">确定恢复内置的默认敏感词吗？</p>
          <div style="font-size:12px;color:var(--text-muted);">
            · 将覆盖现有所有规则<br>
            · 包含 15 条常见敏感词（涉政/涉稳/灾害/谣言等）
          </div>
        </div>
      `, () => {
        const words = WordAPI.restoreDefaults();
        renderStats();
        renderCategoryTabs();
        renderRulesTable();
        showNotification('已恢复', `成功恢复 ${words.length} 条默认规则`, 'success');
      });
    }
  </script>
</body>
</html>
