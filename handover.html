<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>交接班摘要 - 舆情告警工作台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="main-container" id="mainContent">
    <div class="page-header">
      <div class="page-title-block">
        <h1>🔄 交接班摘要</h1>
        <p>汇总本班次高频词、未处理告警、重点账号和处置记录，帮助下一班快速接手工作</p>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="refreshData()">🔄 刷新数据</button>
        <button class="btn" onclick="window.print()">🖨 打印交班表</button>
        <button class="btn btn-primary" onclick="confirmHandover()">✅ 确认交接班</button>
      </div>
    </div>

    <div class="shift-header">
      <div class="shift-header-row">
        <div class="shift-info-block">
          <div>
            <div class="label">当前班次</div>
            <div class="value" id="shiftName">—</div>
          </div>
          <div>
            <div class="label">值班时段</div>
            <div class="value" id="shiftTime">—</div>
          </div>
          <div>
            <div class="label">主班</div>
            <div class="value" id="shiftOperator">—</div>
          </div>
          <div>
            <div class="label">副班</div>
            <div class="value" id="shiftAssistant">—</div>
          </div>
          <div>
            <div class="label">交班时间</div>
            <div class="value" style="color:var(--accent-orange);" id="handoverTime">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="stats-grid" id="statsGrid"></div>

    <div class="summary-grid">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">🔥 本班次高频敏感词 TOP 10</div>
          <span class="tag tag-yellow">按命中次数排序</span>
        </div>
        <div class="panel-body">
          <div id="topWordsList"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">📊 告警分类分布</div>
          <span class="tag tag-blue">按类别统计</span>
        </div>
        <div class="panel-body">
          <div id="categoryProgress"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">🌐 平台来源分布</div>
          <span class="tag tag-cyan">TOP 6 平台</span>
        </div>
        <div class="panel-body">
          <div id="platformProgress"></div>
        </div>
      </div>
    </div>

    <div class="summary-grid" style="grid-template-columns: 1.3fr 1fr; margin-bottom:20px;">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">⚠️ 未处理 & 待跟进告警</div>
          <div class="btn-group">
            <select class="form-select filter-select" id="pendingFilter" onchange="renderPendingAlerts()" style="min-width:140px;">
              <option value="all">全部未办结</option>
              <option value="pending">待处理</option>
              <option value="verifying">待核实</option>
              <option value="reporting">需上报</option>
            </select>
          </div>
        </div>
        <div style="overflow-x:auto;">
          <table class="data-table">
            <thead>
              <tr>
                <th style="width:60px;">等级</th>
                <th>告警内容摘要</th>
                <th style="width:100px;">平台</th>
                <th style="width:100px;">命中词</th>
                <th style="width:80px;">热度</th>
                <th style="width:80px;">剩余时限</th>
                <th style="width:90px;">状态</th>
                <th style="width:90px;">操作</th>
              </tr>
            </thead>
            <tbody id="pendingAlertsBody"></tbody>
          </table>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">🎯 重点关注账号</div>
          <span class="tag tag-red">需持续监测</span>
        </div>
        <div class="panel-body">
          <div id="keyAccountsList"></div>
        </div>
      </div>
    </div>

    <div class="summary-grid" style="grid-template-columns: 1.2fr 1fr; margin-bottom:0;">
      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">📜 本班次处置记录复盘</div>
          <div class="btn-group" style="gap:6px;">
            <button class="btn btn-sm" id="viewTimelineBtn" onclick="switchRecordsView('timeline')">⏱ 时间线</button>
            <button class="btn btn-sm btn-ghost" id="viewGroupBtn" onclick="switchRecordsView('group')">🗂 按告警</button>
            <button class="btn btn-sm btn-ghost" id="viewCardBtn" onclick="switchRecordsView('card')">📋 复盘卡片</button>
          </div>
        </div>
        <div style="padding:8px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap;align-items:center;">
          <select class="form-select filter-select" id="filterStatus" onchange="renderHandoverRecords()" style="min-width:100px;">
            <option value="">全部状态</option>
            <option value="pending">⏳ 待处理</option>
            <option value="verifying">🔍 待核实</option>
            <option value="reporting">📤 需上报</option>
            <option value="false_alarm">🚫 误报</option>
            <option value="done">✅ 已办结</option>
          </select>
          <select class="form-select filter-select" id="filterOperator" onchange="renderHandoverRecords()" style="min-width:100px;">
            <option value="">全部值班员</option>
          </select>
          <select class="form-select filter-select" id="filterType" onchange="renderHandoverRecords()" style="min-width:100px;">
            <option value="">全部类型</option>
            <option value="detect">系统检测</option>
            <option value="status">状态变更</option>
            <option value="remark">添加备注</option>
            <option value="report">上报</option>
          </select>
          <select class="form-select filter-select" id="filterLevel" onchange="renderHandoverRecords()" style="min-width:100px;">
            <option value="">全部等级</option>
            <option value="red">🔴 一级</option>
            <option value="orange">🟠 二级</option>
            <option value="yellow">🟡 三级</option>
            <option value="blue">🔵 四级</option>
          </select>
        </div>
        <div style="padding:4px 16px 8px;font-size:12px;color:var(--text-muted);">
          共 <span id="recordsCount" style="color:var(--accent-blue);font-weight:600;">0</span> 条记录 /
          涉及 <span id="recordsAlerts" style="color:var(--accent-purple);font-weight:600;">0</span> 条告警 /
          符合筛选 <span id="recordsFiltered" style="color:var(--accent-orange);font-weight:600;">0</span> 条
        </div>
        <div class="panel-body" style="max-height:520px;overflow-y:auto;">
          <div id="handoverRecords"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header">
          <div class="panel-title">📋 下一班次工作要点</div>
        </div>
        <div class="panel-body">
          <div class="form-group">
            <label class="form-label">需特别关注事项</label>
            <textarea class="form-textarea" id="nextShiftNotes" style="min-height:160px;" placeholder="请填写下一班需要重点关注的事项、正在跟进中的事件等..."></textarea>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group">
              <label class="form-label">上次修改</label>
              <input type="text" class="form-input" id="lastUpdated" readonly style="color:var(--text-muted);">
            </div>
            <div class="form-group">
              <label class="form-label">交接人签字</label>
              <input type="text" class="form-input" id="signInput" placeholder="请输入姓名">
            </div>
          </div>
          <button class="btn btn-primary" style="width:100%;" onclick="saveNotes()">💾 保存工作要点</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    let recordsViewMode = 'timeline'; // timeline | group

    renderTopNav('handover');
    renderShiftInfo();
    renderAll();

    // 每分钟刷新一下时间显示
    setInterval(() => {
      renderShiftInfo();
      renderStats();
    }, 60000);

    function refreshData() {
      renderAll();
      showNotification('数据已刷新', '所有统计信息已更新为最新状态', 'success');
    }

    function renderAll() {
      initFilterOperator();
      renderStats();
      renderTopWords();
      renderCategoryProgress();
      renderPlatformProgress();
      renderPendingAlerts();
      renderKeyAccounts();
      renderHandoverRecords();
      renderNotes();
    }

    function renderShiftInfo() {
      const shift = getCurrentShift();
      document.getElementById('shiftName').textContent = shift.name;
      document.getElementById('shiftTime').textContent = `${shift.startTime} - ${shift.endTime}`;
      document.getElementById('shiftOperator').textContent = shift.operator;
      document.getElementById('shiftAssistant').textContent = shift.assistant;
      document.getElementById('handoverTime').textContent = formatNowDateTime();
    }

    function renderStats() {
      const s = AlertAPI.getStats();
      const processed = s.verifying + s.reporting + s.done;
      const rate = s.total > 0 ? ((processed / s.total) * 100).toFixed(0) + '%' : '0%';
      const urgentPend = AlertAPI.getAll().filter(a => (a.status === 'pending' || a.status === 'reporting') && a.level === 'red').length;
      const wordsTotal = WordAPI.getStats().total;

      const html = [
        renderStatCard({ icon: '📊', title: '本班次告警', value: s.total, trend: `处置率 ${rate}`, color: 'blue' }),
        renderStatCard({ icon: '✅', title: '已处置', value: processed, trend: `办结 ${s.done} 件`, color: 'green' }),
        renderStatCard({ icon: '⚠️', title: '待跟进', value: s.pending + s.verifying + s.reporting, trend: `误报 ${s.falseAlarm} 条`, color: 'yellow' }),
        renderStatCard({ icon: '🔴', title: '紧急未处理', value: urgentPend, trend: urgentPend > 0 ? '请优先处置' : '全部已响应', color: 'red' }),
        renderStatCard({ icon: '📤', title: '上报事项', value: s.reporting, trend: `${s.reporting} 件待反馈`, color: 'purple' }),
        renderStatCard({ icon: '�', title: '生效规则', value: wordsTotal, trend: '持续更新中', color: 'cyan' })
      ].join('');
      document.getElementById('statsGrid').innerHTML = html;
    }

    function renderTopWords() {
      const words = AlertAPI.getTopWords(10);
      const maxCount = words[0]?.count || 1;

      const colorMap = {
        politics: 'var(--accent-red)',
        stability: 'var(--accent-orange)',
        disaster: 'var(--accent-yellow)',
        rumor: 'var(--accent-purple)',
        vulgar: 'var(--accent-blue)',
        other: 'var(--accent-cyan)'
      };

      const html = words.map((w, i) => {
        const pct = (w.count / maxCount * 100).toFixed(0);
        const color = colorMap[w.category] || 'var(--accent-blue)';
        return `
          <div class="progress-item">
            <div class="progress-label">
              <span class="name">
                <span style="color:var(--text-muted);display:inline-block;width:22px;">${i + 1}.</span>
                <strong>${w.word}</strong>
              </span>
              <span class="num">${w.count} 次</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%;background:${color};"></div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('topWordsList').innerHTML = html;
    }

    function renderCategoryProgress() {
      const catStats = AlertAPI.getCategoryStats();
      const max = Math.max(...catStats.map(c => c.count), 1);
      const colorMap = {
        red: 'var(--accent-red)',
        orange: 'var(--accent-orange)',
        yellow: 'var(--accent-yellow)',
        purple: 'var(--accent-purple)',
        blue: 'var(--accent-blue)',
        gray: 'var(--text-muted)'
      };

      const html = catStats.map(c => {
        const pct = (c.count / max * 100).toFixed(0);
        return `
          <div class="progress-item">
            <div class="progress-label">
              <span class="name">${c.icon} ${c.name}</span>
              <span class="num">${c.count} 条</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%;background:${colorMap[c.color]};"></div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('categoryProgress').innerHTML = html;
    }

    function renderPlatformProgress() {
      const pStats = AlertAPI.getPlatformStats().slice(0, 6);
      const max = Math.max(...pStats.map(p => p.count), 1);

      const colorMap = {
        red: 'var(--accent-red)',
        green: 'var(--accent-green)',
        blue: 'var(--accent-blue)',
        cyan: 'var(--accent-cyan)',
        orange: 'var(--accent-orange)',
        pink: 'var(--accent-purple)',
        gray: 'var(--text-muted)'
      };
      const html = pStats.map(p => {
        const pct = (p.count / max * 100).toFixed(0);
        const info = PLATFORMS[p.platform];
        return `
          <div class="progress-item">
            <div class="progress-label">
              <span class="name">${info.icon} ${info.name}</span>
              <span class="num">${p.count} 条</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" style="width:${pct}%;background:${colorMap[info.color] || 'var(--accent-blue)'};"></div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('platformProgress').innerHTML = html;
    }

    function renderPendingAlerts() {
      const filter = document.getElementById('pendingFilter').value;
      let pending = AlertAPI.getUnprocessed();
      if (filter !== 'all') {
        pending = pending.filter(a => a.status === filter);
      }

      if (pending.length === 0) {
        document.getElementById('pendingAlertsBody').innerHTML = `
          <tr><td colspan="8">
            <div class="empty-state">
              <div class="empty-state-icon">🎊</div>
              <div class="empty-state-text">本类别暂无待跟进告警</div>
            </div>
          </td></tr>
        `;
        return;
      }

      const html = pending.slice(0, 12).map(a => {
        const pInfo = PLATFORMS[a.platform];
        const shortContent = a.content.length > 50 ? a.content.slice(0, 50) + '...' : a.content;
        const levelIcon = a.level === 'red' ? '🔴' : a.level === 'orange' ? '🟠' : a.level === 'yellow' ? '🟡' : '🔵';
        const deadlineColor = a.deadline <= 30 ? 'color:var(--accent-red);font-weight:600;' : '';

        return `
          <tr>
            <td style="text-align:center;font-size:18px;">${levelIcon}</td>
            <td style="font-size:13px;">${shortContent}</td>
            <td><span class="tag tag-gray">${pInfo.icon} ${pInfo.name}</span></td>
            <td><span class="tag tag-red">${a.hitWord}</span></td>
            <td style="color:${getHeatColor(a.heat)};font-weight:600;">🔥 ${a.heat}</td>
            <td style="${deadlineColor}">⏱ ${a.deadline}分</td>
            <td><span class="tag ${getStatusTagClass(a.status)}">${getStatusText(a.status)}</span></td>
            <td>
              <button class="btn btn-sm btn-primary" onclick="goToAlert(${a.id})">处理 →</button>
            </td>
          </tr>
        `;
      }).join('');
      document.getElementById('pendingAlertsBody').innerHTML = html;
    }

    function renderKeyAccounts() {
      const html = keyAccounts.map(acc => {
        const pInfo = PLATFORMS[acc.platform];
        const riskMap = { high: 'tag-red', medium: 'tag-orange', low: 'tag-blue' };
        const riskText = { high: '高风险', medium: '中风险', low: '低风险' };
        const avatarColor = { high: 'var(--accent-red)', medium: 'var(--accent-orange)', low: 'var(--accent-blue)' }[acc.riskLevel];

        return `
          <div class="account-card">
            <div class="account-avatar" style="background:${avatarColor}20;color:${avatarColor};">${acc.avatar}</div>
            <div class="account-info">
              <div class="account-name">
                ${acc.name}
                <span class="tag ${riskMap[acc.riskLevel]}">${riskText[acc.riskLevel]}</span>
              </div>
              <div class="account-platform">${pInfo.icon} ${pInfo.name} · 活跃 ${acc.lastActive}</div>
              <div class="account-stats">
                <span>👥 ${formatNumber(acc.fans)}</span>
                <span>🚨 ${acc.alertCount} 次告警</span>
              </div>
            </div>
          </div>
        `;
      }).join('');
      document.getElementById('keyAccountsList').innerHTML = html;
    }

    // ==========================================
    // 处置记录时间线（带筛选）
    // ==========================================
    function initFilterOperator() {
      const logs = LogAPI.getAll();
      const operators = [...new Set(logs.map(l => l.operator))].filter(Boolean);
      const sel = document.getElementById('filterOperator');
      if (!sel) return;
      const cur = sel.value;
      sel.innerHTML = '<option value="">全部值班员</option>' + operators.map(op => `<option value="${op}">${op}</option>`).join('');
      sel.value = cur;
    }

    function switchRecordsView(mode) {
      recordsViewMode = mode;
      document.getElementById('viewTimelineBtn').className = mode === 'timeline' ? 'btn btn-sm' : 'btn btn-sm btn-ghost';
      document.getElementById('viewGroupBtn').className = mode === 'group' ? 'btn btn-sm' : 'btn btn-sm btn-ghost';
      document.getElementById('viewCardBtn').className = mode === 'card' ? 'btn btn-sm' : 'btn btn-sm btn-ghost';
      renderHandoverRecords();
    }

    function renderHandoverRecords() {
      const allLogs = LogAPI.getTimeline();
      document.getElementById('recordsCount').textContent = allLogs.length;

      const fOperator = document.getElementById('filterOperator')?.value || '';
      const fType = document.getElementById('filterType')?.value || '';
      const fLevel = document.getElementById('filterLevel')?.value || '';
      const fStatus = document.getElementById('filterStatus')?.value || '';

      let logs = allLogs;
      if (fOperator) logs = logs.filter(l => l.operator === fOperator);
      if (fType) logs = logs.filter(l => l.type === fType);
      if (fLevel) logs = logs.filter(l => {
        const a = AlertAPI.getById(l.alertId);
        return a && a.level === fLevel;
      });
      if (fStatus) logs = logs.filter(l => {
        if (fStatus === 'done') return l.toStatus === 'done';
        if (fStatus === 'false_alarm') return l.toStatus === 'false_alarm';
        if (fStatus === 'reporting') return l.toStatus === 'reporting' || l.type === 'report';
        if (fStatus === 'verifying') return l.toStatus === 'verifying';
        if (fStatus === 'pending') {
          const a = AlertAPI.getById(l.alertId);
          return a && a.status === 'pending';
        }
        return true;
      });

      const alertIdsInvolved = [...new Set(logs.map(l => l.alertId).filter(Boolean))];
      document.getElementById('recordsAlerts').textContent = alertIdsInvolved.length;
      document.getElementById('recordsFiltered').textContent = logs.length;

      if (logs.length === 0) {
        document.getElementById('handoverRecords').innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📝</div>
            <div class="empty-state-text">${allLogs.length === 0 ? '暂无处置记录' : '当前筛选条件下无匹配记录'}</div>
          </div>
        `;
        return;
      }

      if (recordsViewMode === 'timeline') {
        const html = logs.map(log => {
          const alert = AlertAPI.getById(log.alertId);
          const alertSummary = alert ? (alert.content.length > 25 ? alert.content.slice(0, 25) + '...' : alert.content) : '（告警已删除）';
          const levelColor = alert?.level === 'red' ? 'var(--accent-red)' :
                             alert?.level === 'orange' ? 'var(--accent-orange)' :
                             alert?.level === 'yellow' ? 'var(--accent-yellow)' : 'var(--accent-blue)';
          const levelIcon = alert?.level === 'red' ? '🔴' : alert?.level === 'orange' ? '🟠' : alert?.level === 'yellow' ? '🟡' : '🔵';

          return `
            <div class="timeline-record" style="display:flex;gap:12px;padding:12px 0;border-bottom:1px dashed var(--border);cursor:pointer;transition:background 0.15s;"
                 onmouseenter="this.style.background='var(--bg-tertiary)'" onmouseleave="this.style.background=''"
                 onclick="${log.alertId && log.alertId > 0 ? `goToAlert(${log.alertId})` : ''}"
                 title="${log.alertId && log.alertId > 0 ? '点击查看对应告警详情' : ''}">
              <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;">
                <div style="width:10px;height:10px;border-radius:50%;background:${levelColor};margin-top:6px;"></div>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px;">
                  <div style="font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                    ${alert ? `<span style="font-size:12px;color:var(--text-muted);">${levelIcon} ${WORD_CATEGORIES[alert.category]?.name || ''}</span>` : ''}
                    <span class="tag ${getLogTypeTagClass(log.type)}" style="font-size:11px;">${getLogTypeText(log.type)}</span>
                    ${log.fromStatus && log.toStatus && log.fromStatus !== log.toStatus ? `
                      <span style="font-size:12px;color:var(--text-muted);">
                        ${getStatusText(log.fromStatus)} → ${getStatusText(log.toStatus)}
                      </span>
                    ` : ''}
                    ${log.extra?.department ? `<span class="tag tag-red" style="font-size:11px;">📤 ${log.extra.department}</span>` : ''}
                    ${alert?.reportInfo ? `<span class="tag ${alert.status === 'done' ? 'tag-green' : 'tag-red'}" style="font-size:11px;">${alert.status === 'done' ? '✅' : '⏳'} ${alert.status === 'done' ? '已办结' : alert.reportInfo.department}</span>` : ''}
                  </div>
                  <div style="font-size:11px;color:var(--text-muted);font-family:Consolas;white-space:nowrap;">
                    ${formatTime(log.createdAt)}
                  </div>
                </div>
                <div style="font-size:12px;color:var(--text-secondary);margin-bottom:4px;">
                  <strong style="color:var(--text-primary);">${log.operator}</strong>
                  ${log.alertId && log.alertId > 0 ? `· 告警 #${String(log.alertId).slice(-6)}` : ''}
                </div>
                <div style="font-size:13px;color:var(--text-primary);margin-bottom:4px;">${log.remark}</div>
                ${log.extra?.note ? `<div style="font-size:12px;color:var(--accent-blue);margin-bottom:4px;padding:4px 8px;background:var(--accent-blue)10;border-radius:4px;">💬 ${log.extra.note}</div>` : ''}
                ${alert?.reportInfo ? `
                  <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;padding:4px 8px;background:var(--accent-red)8;border-radius:4px;">
                    📤 上报至 ${alert.reportInfo.department} · ${alert.reportInfo.reportedAt}
                    ${alert.status === 'done' ? '<span style="color:var(--accent-green);margin-left:8px;">✅ 已办结</span>' : '<span style="color:var(--accent-orange);margin-left:8px;">⏳ 待反馈</span>'}
                  </div>
                ` : ''}
                ${alert ? `<div style="font-size:11px;color:var(--text-muted);">🔗 ${alertSummary}</div>` : ''}
              </div>
            </div>
          `;
        }).join('');

        document.getElementById('handoverRecords').innerHTML = html;
      } else if (recordsViewMode === 'group') {
        // 按告警聚合视图
        const grouped = {};
        logs.forEach(log => {
          const aid = log.alertId || 'system';
          if (!grouped[aid]) grouped[aid] = { alert: AlertAPI.getById(aid), logs: [] };
          grouped[aid].logs.push(log);
        });

        const html = Object.entries(grouped).map(([aid, g]) => {
          const alert = g.alert;
          const isSystem = aid === 'system' || aid === '0';
          const alertSummary = alert ? (alert.content.length > 30 ? alert.content.slice(0, 30) + '...' : alert.content) : isSystem ? '系统操作' : '（告警已删除）';
          const levelIcon = alert?.level === 'red' ? '🔴' : alert?.level === 'orange' ? '🟠' : alert?.level === 'yellow' ? '🟡' : alert?.level === 'blue' ? '🔵' : '';
          const statusTag = alert ? `<span class="tag ${getStatusTagClass(alert.status)}" style="font-size:11px;margin-left:8px;">${getStatusText(alert.status)}</span>` : '';
          const followUps = alert ? FollowUpAPI.getByAlertId(alert.id) : [];

          const logsHtml = g.logs.map(log => `
            <div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px dashed var(--border);">
              <div style="flex-shrink:0;font-size:11px;color:var(--text-muted);font-family:Consolas;width:80px;">
                ${formatTime(log.createdAt)}
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:12px;">
                  <span class="tag ${getLogTypeTagClass(log.type)}" style="font-size:10px;">${getLogTypeText(log.type)}</span>
                  <strong style="margin:0 6px;">${log.operator}</strong>
                  ${log.fromStatus && log.toStatus && log.fromStatus !== log.toStatus ? `(${getStatusText(log.fromStatus)}→${getStatusText(log.toStatus)})` : ''}
                </div>
                <div style="font-size:12px;color:var(--text-secondary);margin-top:2px;">${log.remark}</div>
                ${log.extra?.department ? `<div style="font-size:11px;color:var(--accent-red);margin-top:2px;">📤 ${log.extra.department}</div>` : ''}
                ${log.extra?.note ? `<div style="font-size:11px;color:var(--accent-blue);margin-top:2px;">💬 ${log.extra.note}</div>` : ''}
              </div>
            </div>
          `).join('');

          const followUpsHtml = followUps.length > 0 ? `
            <div style="padding:8px 0 4px;">
              <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">🔗 协同跟进 (${followUps.length})</div>
              ${followUps.map(fu => `
                <div style="font-size:11px;padding:4px 0 8px;color:var(--text-secondary);border-bottom:1px dashed var(--border);">
                  <div style="margin-bottom:4px;">
                    <span class="tag tag-blue" style="font-size:10px;">${fu.type === 'progress' ? '📝 跟进进展' : fu.type === 'result' ? '✅ 办结反馈' : '📎 附件'}</span>
                    <strong style="margin:0 4px;color:var(--text-primary);">${fu.title}</strong> · ${fu.operator} · ${formatTime(fu.createdAt)}
                  </div>
                  <div style="font-size:12px;color:var(--text-primary);padding:2px 0;">${fu.content || '—'}</div>
                  ${fu.attachment ? `
                    <div style="font-size:11px;margin-top:4px;">
                      <a href="${fu.attachment.url}" target="_blank" style="color:var(--accent-blue);text-decoration:none;">
                        📎 ${fu.attachment.name}
                      </a>
                    </div>
                  ` : ''}
                </div>
              `).join('')}
            </div>
          ` : '';

          return `
            <div style="padding:12px 0;border-bottom:1px solid var(--border);cursor:pointer;"
                 onmouseenter="this.style.background='var(--bg-tertiary)'" onmouseleave="this.style.background=''"
                 onclick="${!isSystem && alert ? `goToAlert(${alert.id})` : ''}">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                <div style="font-weight:600;font-size:13px;">
                  ${levelIcon} ${alert ? `<span class="tag tag-${WORD_CATEGORIES[alert.category]?.color}" style="font-size:10px;margin-right:6px;">${WORD_CATEGORIES[alert.category]?.icon} ${WORD_CATEGORIES[alert.category]?.name}</span>` : ''}
                  ${alertSummary}
                  ${statusTag}
                  ${alert?.reportInfo ? `<span class="tag tag-red" style="font-size:10px;margin-left:6px;">📤 ${alert.reportInfo.department}${alert.status === 'done' ? '（已办结）' : ''}</span>` : ''}
                </div>
                <div style="font-size:11px;color:var(--text-muted);">
                  ${g.logs.length} 条记录${followUps.length > 0 ? ` · ${followUps.length} 条跟进` : ''}
                </div>
              </div>
              ${logsHtml}
              ${followUpsHtml}
            </div>
          `;
        }).join('');

        document.getElementById('handoverRecords').innerHTML = html;
      } else {
        // 复盘卡片视图
        const grouped = {};
        logs.forEach(log => {
          const aid = log.alertId || 'system';
          if (!grouped[aid]) grouped[aid] = { alert: AlertAPI.getById(aid), logs: [] };
          grouped[aid].logs.push(log);
        });

        const cards = Object.entries(grouped).filter(([aid]) => aid !== 'system' && aid !== '0').map(([aid, g]) => {
          const alert = g.alert;
          if (!alert) return '';

          const levelIcon = alert.level === 'red' ? '🔴' : alert.level === 'orange' ? '🟠' : alert.level === 'yellow' ? '🟡' : '🔵';
          const levelName = alert.level === 'red' ? '一级' : alert.level === 'orange' ? '二级' : alert.level === 'yellow' ? '三级' : '四级';
          const catInfo = WORD_CATEGORIES[alert.category] || WORD_CATEGORIES.other;
          const followUps = FollowUpAPI.getByAlertId(alert.id);

          const timelineHtml = g.logs.map(log => `
            <div style="display:flex;gap:10px;padding:6px 0;">
              <div style="width:14px;position:relative;">
                <div style="width:8px;height:8px;border-radius:50%;background:var(--accent-blue);position:absolute;top:5px;left:3px;"></div>
                <div style="width:1px;background:var(--border);position:absolute;top:13px;bottom:-6px;left:6px;"></div>
              </div>
              <div style="flex:1;">
                <div style="font-size:11px;color:var(--text-muted);margin-bottom:2px;">
                  ${formatTime(log.createdAt)} · <strong>${log.operator}</strong> · 
                  <span class="tag ${getLogTypeTagClass(log.type)}" style="font-size:10px;">${getLogTypeText(log.type)}</span>
                  ${log.fromStatus && log.toStatus && log.fromStatus !== log.toStatus ? ` · ${getStatusText(log.fromStatus)}→${getStatusText(log.toStatus)}` : ''}
                </div>
                <div style="font-size:12px;">${log.remark}</div>
                ${log.extra?.department ? `<div style="font-size:11px;color:var(--accent-red);margin-top:2px;">📤 ${log.extra.department}</div>` : ''}
                ${log.extra?.note ? `<div style="font-size:11px;color:var(--accent-blue);margin-top:2px;">💬 ${log.extra.note}</div>` : ''}
              </div>
            </div>
          `).join('');

          const followHtml = followUps.length > 0 ? `
            <div style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);">
              <div style="font-size:12px;font-weight:600;margin-bottom:8px;">🔗 协同跟进 (${followUps.length})</div>
              ${followUps.map(fu => `
                <div style="background:var(--bg-tertiary);border-radius:6px;padding:10px;margin-bottom:6px;">
                  <div style="font-size:11px;color:var(--text-muted);margin-bottom:4px;">
                    <span class="tag tag-blue" style="font-size:10px;">${fu.type === 'progress' ? '📝 跟进进展' : fu.type === 'result' ? '✅ 办结反馈' : '📎 附件'}</span>
                    <strong style="margin:0 6px;">${fu.title}</strong> · ${fu.operator} · ${formatTime(fu.createdAt)}
                  </div>
                  <div style="font-size:12px;">${fu.content || '—'}</div>
                  ${fu.attachment ? `
                    <div style="margin-top:6px;">
                      <a href="${fu.attachment.url}" target="_blank" style="color:var(--accent-blue);text-decoration:none;font-size:11px;">
                        📎 ${fu.attachment.name}
                      </a>
                    </div>
                  ` : ''}
                </div>
              `).join('')}
            </div>
          ` : '';

          const judgmentHtml = alert.judgment ? `
            <div style="background:linear-gradient(135deg, var(--accent-blue)10, var(--accent-purple)10);border-radius:6px;padding:12px;margin-top:12px;border:1px solid var(--accent-blue)20;">
              <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--accent-blue);">🔍 研判结论</div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">
                <div>
                  <div style="color:var(--text-muted);font-size:11px;">事件性质</div>
                  <div style="font-weight:500;">${alert.judgment.nature || '—'}</div>
                </div>
                <div>
                  <div style="color:var(--text-muted);font-size:11px;">风险等级</div>
                  <div style="font-weight:500;">
                    ${alert.judgment.riskLevel 
                      ? `<span class="tag ${alert.judgment.riskLevel === '高' ? 'tag-red' : alert.judgment.riskLevel === '中' ? 'tag-orange' : 'tag-green'}" style="font-size:10px;">${alert.judgment.riskLevel}风险</span>` 
                      : '—'}
                  </div>
                </div>
                <div style="grid-column:span 2;">
                  <div style="color:var(--text-muted);font-size:11px;">影响范围</div>
                  <div style="font-weight:500;">${alert.judgment.scope || '—'}</div>
                </div>
                <div style="grid-column:span 2;">
                  <div style="color:var(--text-muted);font-size:11px;">建议口径</div>
                  <div style="font-weight:500;">${alert.judgment.response || '—'}</div>
                </div>
              </div>
              <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);font-size:11px;color:var(--text-muted);">
                研判人：${alert.judgment.savedBy} · ${alert.judgment.savedAt}
              </div>
            </div>
          ` : '';

          const attachments = followUps.filter(fu => fu.attachment);
          const attachHtml = attachments.length > 0 ? `
            <div style="margin-top:12px;padding-top:12px;border-top:1px dashed var(--border);">
              <div style="font-size:12px;font-weight:600;margin-bottom:8px;">📎 相关附件 (${attachments.length})</div>
              ${attachments.map(a => `
                <div style="padding:4px 0;font-size:12px;">
                  📎 <a href="${a.attachment.url}" target="_blank" style="color:var(--accent-blue);text-decoration:none;">${a.attachment.name}</a>
                </div>
              `).join('')}
            </div>
          ` : '';

          return `
            <div style="background:var(--bg-primary);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;page-break-inside:avoid;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--border);">
                <div>
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
                    <span style="font-size:18px;">${levelIcon}</span>
                    <span class="tag tag-${catInfo.color}" style="font-size:11px;">${catInfo.icon} ${catInfo.name}</span>
                    <span class="tag ${getStatusTagClass(alert.status)}" style="font-size:11px;">${getStatusText(alert.status)}</span>
                    <span style="font-size:11px;color:var(--text-muted);">${levelName} / ${alert.matchType}</span>
                  </div>
                  <div style="font-size:16px;font-weight:700;">告警 #${String(alert.id).slice(-6)}</div>
                </div>
                <div style="text-align:right;font-size:11px;color:var(--text-muted);">
                  <div>命中词：<span style="font-weight:600;color:var(--accent-red);">${alert.hitWord}</span></div>
                  <div>生成时间：${formatTime(alert.createdAt)}</div>
                  <div>来源：${alert.platform} · ${alert.author}</div>
                </div>
              </div>

              <div style="background:var(--bg-tertiary);border-radius:6px;padding:12px;margin-bottom:16px;">
                <div style="font-size:12px;color:var(--text-muted);margin-bottom:4px;">📄 告警内容</div>
                <div style="font-size:13px;line-height:1.6;">${alert.content}</div>
                ${alert.context ? `<div style="font-size:12px;color:var(--text-muted);margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);">上下文：${alert.context}</div>` : ''}
              </div>

              ${alert.reportInfo ? `
                <div style="background:var(--accent-red)8;border-radius:6px;padding:12px;margin-bottom:16px;border:1px solid var(--accent-red)20;">
                  <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--accent-red);">📤 上报信息</div>
                  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:12px;">
                    <div>
                      <div style="color:var(--text-muted);font-size:11px;">接收部门</div>
                      <div style="font-weight:600;">${alert.reportInfo.department}</div>
                    </div>
                    <div>
                      <div style="color:var(--text-muted);font-size:11px;">上报时间</div>
                      <div>${alert.reportInfo.reportedAt}</div>
                    </div>
                    <div>
                      <div style="color:var(--text-muted);font-size:11px;">上报人</div>
                      <div>${alert.reportInfo.reportedBy}</div>
                    </div>
                    <div>
                      <div style="color:var(--text-muted);font-size:11px;">当前状态</div>
                      <div>${alert.status === 'done' ? '<span class="tag tag-green" style="font-size:10px;">✅ 已办结</span>' : '<span class="tag tag-orange" style="font-size:10px;">⏳ 待反馈</span>'}</div>
                    </div>
                  </div>
                  ${alert.reportInfo.note ? `
                    <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--accent-red)30;">
                      <div style="color:var(--text-muted);font-size:11px;">上报说明</div>
                      <div>${alert.reportInfo.note}</div>
                    </div>
                  ` : ''}
                </div>
              ` : ''}

              <div style="margin-bottom:16px;">
                <div style="font-size:12px;font-weight:600;margin-bottom:10px;">⏱ 处置时间线 (${g.logs.length})</div>
                ${timelineHtml}
              </div>

              ${followHtml}
              ${attachHtml}
              ${judgmentHtml}

              <div style="margin-top:16px;padding-top:12px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--text-muted);">
                <div>📊 传播热度：${alert.heat} · 转发 ${alert.repost} · 评论 ${alert.comment}</div>
                <button class="btn btn-sm" onclick="goToAlert(${alert.id})">🔗 查看详情</button>
              </div>
            </div>
          `;
        }).join('');

        const printBtn = cards ? `
          <div style="text-align:right;margin-bottom:12px;">
            <button class="btn btn-sm" onclick="window.print()">🖨️ 打印复盘报告</button>
          </div>
        ` : '';

        document.getElementById('handoverRecords').innerHTML = printBtn + (cards || '<div style="text-align:center;padding:40px;color:var(--text-muted);">本班次暂无告警处置记录</div>');
      }
    }

    function renderNotes() {
      const notes = HandoverNotes.get();
      document.getElementById('nextShiftNotes').value = notes.content;
      document.getElementById('signInput').value = notes.operator || '';
      document.getElementById('lastUpdated').value = notes.updatedAt || '未保存';
    }

    function saveNotes() {
      const content = document.getElementById('nextShiftNotes').value;
      const sign = document.getElementById('signInput').value.trim();
      if (!sign) { showNotification('请签字确认', '输入交接人姓名后保存', 'warning'); return; }
      HandoverNotes.save(content, sign);
      document.getElementById('lastUpdated').value = formatNowDateTime();
      showNotification('保存成功', `交班记录已存档（签字：${sign}）`, 'success');
    }

    function goToAlert(id) {
      window.location.href = `alerts.html?highlight=${id}`;
    }

    function confirmHandover() {
      const sign = document.getElementById('signInput').value.trim();
      const s = AlertAPI.getStats();
      const pending = s.pending + s.verifying + s.reporting;

      showModal('确认交接班', `
        <div style="padding:12px 0;">
          <p style="margin-bottom:16px;">确认将工作交接给下一班次人员吗？</p>
          <div style="background:var(--bg-tertiary);padding:14px;border-radius:8px;">
            <div style="margin-bottom:8px;"><strong>交班人：</strong>${getCurrentShift().operator}${sign ? `（${sign}）` : ''}</div>
            <div style="margin-bottom:8px;"><strong>待跟进告警：</strong><span style="color:var(--accent-orange);font-weight:600;">${pending} 条</span></div>
            <div style="margin-bottom:8px;"><strong>本班处置记录：</strong>${LogAPI.getAll().length} 条</div>
            <div><strong>工作要点：</strong>已填写 ${document.getElementById('nextShiftNotes').value.length} 字</div>
          </div>
        </div>
      `, () => {
        if (!sign) {
          showNotification('请先签字', '在"交接人签字"处填写姓名', 'warning');
          return false;
        }
        // 记录交班日志
        LogAPI.add({
          alertId: 0,
          type: 'status',
          operator: sign,
          remark: `【交接班】${getCurrentShift().name} 交班给下一班，待跟进 ${pending} 条告警`
        });
        showNotification('✅ 交接班完成', '工作已顺利交接给下一班', 'success');
        renderHandoverRecords();
      });
    }
  </script>
</body>
</html>
